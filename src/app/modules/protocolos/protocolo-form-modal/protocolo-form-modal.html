@if (isOpen) {
  <div class="modal-overlay" (click)="onClose()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ modalTitle }}</h2>
        <button type="button" class="close-btn" (click)="onClose()" [disabled]="saving()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="modal-body">
          @if (error()) {
            <div class="alert alert-error">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>{{ error() }}</span>
            </div>
          }

          <div class="form-grid">
            <div class="form-group full-width">
              <label for="pt-nombre">Nombre del tratamiento *</label>
              <input
                type="text"
                id="pt-nombre"
                formControlName="nombre_tratamiento"
                placeholder="Ej. Obturación simple"
                [class.error]="form.get('nombre_tratamiento')?.touched && form.get('nombre_tratamiento')?.invalid"
              />
              @if (getFieldError('nombre_tratamiento'); as err) {
                <span class="error-message">{{ err }}</span>
              }
            </div>

            <div class="form-group full-width">
              <label for="pt-material">Material de stock *</label>
              <select
                id="pt-material"
                formControlName="material_id"
                [class.error]="form.get('material_id')?.touched && form.get('material_id')?.invalid"
              >
                <option value="">Selecciona un material</option>
                @for (m of materiales(); track m.id) {
                  <option [value]="m.id">{{ m.nombre }} ({{ m.unidad }})</option>
                }
              </select>
              @if (getFieldError('material_id'); as err) {
                <span class="error-message">{{ err }}</span>
              }
            </div>

            <div class="form-group">
              <label for="pt-cantidad">Cantidad necesaria *</label>
              <input
                type="number"
                id="pt-cantidad"
                formControlName="cantidad_necesaria"
                step="0.01"
                min="0.0001"
                [class.error]="form.get('cantidad_necesaria')?.touched && form.get('cantidad_necesaria')?.invalid"
              />
              @if (getFieldError('cantidad_necesaria'); as err) {
                <span class="error-message">{{ err }}</span>
              }
            </div>

            <div class="form-group full-width">
              <label for="pt-notas">Notas paso a paso</label>
              <textarea
                id="pt-notas"
                formControlName="notas_paso_a_paso"
                rows="4"
                placeholder="Instrucciones breves para el alumno o clínica…"
              ></textarea>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="onClose()" [disabled]="saving()">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="saving() || form.invalid">
            @if (saving()) {
              <div class="btn-spinner"></div>
              <span>Guardando...</span>
            } @else {
              <span>{{ isEditMode ? 'Actualizar' : 'Crear' }}</span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
