@if (isOpen) {
  <div class="modal-overlay" (click)="onClose()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ modalTitle }}</h2>
        <button type="button" class="close-btn" (click)="onClose()" [disabled]="saving()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="modal-body">
          @if (error()) {
            <div class="alert alert-error">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>{{ error() }}</span>
            </div>
          }

          <p class="hint-line">
            Solo los gabinetes en estado <strong>disponible</strong> pueden usarse al crear citas.
          </p>

          <div class="form-grid">
            <div class="form-group full-width">
              <label for="box-nombre">Nombre *</label>
              <input
                type="text"
                id="box-nombre"
                formControlName="nombre"
                placeholder="Gabinete 1"
                [class.error]="form.get('nombre')?.touched && form.get('nombre')?.invalid"
              />
              @if (getFieldError('nombre'); as err) {
                <span class="error-message">{{ err }}</span>
              }
            </div>

            <div class="form-group full-width">
              <label for="box-descripcion">Descripción</label>
              <textarea
                id="box-descripcion"
                formControlName="descripcion"
                rows="3"
                placeholder="Ubicación, equipamiento…"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="box-estado">Estado *</label>
              <select
                id="box-estado"
                formControlName="estado"
                [class.error]="form.get('estado')?.touched && form.get('estado')?.invalid"
              >
                @for (e of estados; track e) {
                  <option [value]="e">{{ e | titlecase }}</option>
                }
              </select>
              @if (getFieldError('estado'); as err) {
                <span class="error-message">{{ err }}</span>
              }
            </div>

            <div class="form-group">
              <label for="box-dentist">Odontólogo asignado</label>
              <select id="box-dentist" formControlName="dentistSelect">
                <option value="">Sin odontólogo asignado</option>
                @for (d of dentists(); track d.id) {
                  <option [value]="d.id">{{ d.nombre }} {{ d.apellidos }}</option>
                }
              </select>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="onClose()" [disabled]="saving()">
            Cancelar
          </button>
          <button type="submit" class="btn-primary" [disabled]="saving() || form.invalid">
            @if (saving()) {
              <div class="btn-spinner"></div>
              <span>Guardando...</span>
            } @else {
              <span>{{ isEditMode ? 'Actualizar' : 'Crear' }}</span>
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
