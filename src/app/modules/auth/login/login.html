<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="dentify-title">DENTIFY</h1>
      <p class="dentify-subtitle">Gestión Clínica Odontológica</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="ejemplo@dentify.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="********">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-login">
        Entrar al Sistema
      </button>
    </form>

    <div class="login-footer">
      <a href="#">¿Olvidaste tu contraseña?</a>
      <p>¿No tienes cuenta? <span class="link">Contacta con el administrador</span></p>
    </div>
  </div>
</div>
